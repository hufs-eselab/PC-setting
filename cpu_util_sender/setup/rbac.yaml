apiVersion: v1
kind: ServiceAccount
metadata:
  name: mckube-cpu-agent
  namespace: mc-kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mckube-cpu-agent
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mckube-cpu-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mckube-cpu-agent
subjects:
- kind: ServiceAccount
  name: mckube-cpu-agent
  namespace: mc-kube-system